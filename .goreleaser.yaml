version: 2

builds:
  - main: ./cmd/agent-telemetry/
    binary: agent-telemetry
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version=v{{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
